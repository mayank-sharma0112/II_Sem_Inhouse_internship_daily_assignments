<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Successful</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f2f5;
}

.bx{
    width: 420px;
    background: #ffffff;
    padding: 40px 30px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.ig{
    width: 95px;
    height: 95px;
    border-radius: 50%;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.tq{
    font-size: 65px;
    color: #27ae60;
}

h1{
    color: #222;
    margin: 10px 0 15px;
    font-size: 26px;
}

p{
    color: #666;
    margin-bottom: 30px;
    font-size: 16px;
    line-height: 1.5;
}

button{
    background: #e67e22;
    color: #fff;
    border: none;
    padding: 10px 24px;
    font-size: 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover{
    background: #d35400;
    transform: translateY(-2px);
}
</style>

</head>
<body>

<div class="bx">
    <img src="clgLOGO.jpg" class="ig" alt="logo">
    
    <div class="tq">✔</div>
    
    <h1>Admission Successful!</h1>
    
    <p>
        Congratulations! 🎉<br><br>
